<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Church Financial System</title>
    
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-512.png">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-512.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (Pinned to stable version 7) -->
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

    <!-- html2pdf.js for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f3f4f6;
            overscroll-behavior-y: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        input, textarea, select, .selectable {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        .sidebar-link.active { background-color: #4f46e5; color: white; }
        .sidebar-link:hover:not(.active) { background-color: #e0e7ff; color: #4338ca; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7c7c7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        .tab-btn.active { border-bottom: 2px solid #4f46e5; color: #4f46e5; font-weight: bold; }
        .tab-btn { color: #6b7280; font-weight: 500; }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }

        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .mobile-sidebar { transition: transform 0.3s ease-in-out; }

        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; }
            #root { height: auto; overflow: visible; }
            .p-6 { padding: 0 !important; }
            .shadow, .shadow-lg, .shadow-xl { box-shadow: none !important; }
            .bg-white { background: transparent !important; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Expose Firebase functions to global scope for Babel script
        window.firebaseModules = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, setDoc, onSnapshot
        };
        
        // Let the React code know that the asynchronous modules have finished loading
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>

    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('SW registered: ', registration.scope))
                    .catch(err => console.log('SW registration failed: ', err));
            });
        }
    </script>

    <script type="text/babel">
        const startApp = () => {
            try {
                const { useState, useEffect, useMemo, useRef } = React;
                const { 
                    initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
                    getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, setDoc, onSnapshot 
                } = window.firebaseModules;

                let firebaseConfig = {
                    apiKey: "AIzaSyAmRPkVwjnxYaSSkB6H1eOqQ_7sdeKkIxA",
                    authDomain: "ewmapp-7c52f.firebaseapp.com",
                    projectId: "ewmapp-7c52f",
                    storageBucket: "ewmapp-7c52f.firebasestorage.app",
                    messagingSenderId: "625697835140",
                    appId: "1:625697835140:web:e2814504a25fdaefce1ad1",
                    measurementId: "G-JQ6XX31018"
                };
                
                try {
                    if (typeof __firebase_config !== 'undefined') {
                        firebaseConfig = JSON.parse(__firebase_config);
                    }
                } catch(e) {
                    console.error("Failed to parse __firebase_config", e);
                }

                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

                // Core Departments for Finance
                const DEPARTMENTS = ['General Offering', 'Youth Fund', 'Food Fund', "Men's Fund", "Women's Fund", 'Music Fund', 'Pledges'];
                
                const INITIAL_ADMIN = { 
                    username: 'admin', password: 'admin123!', role: 'admin', name: 'System Administrator', 
                    authorizedDepartments: DEPARTMENTS
                };

                const getPermissions = (user, department) => {
                    if (user.role === 'admin') return { view: true, manage: true };
                    if (user.role === 'treasurer') {
                        const hasAccess = user.authorizedDepartments?.includes(department);
                        return { view: hasAccess, manage: hasAccess };
                    }
                    return { view: false, manage: false };
                };

                const useFirestore = (collectionName, firebaseAuthUser) => {
                    const [data, setData] = useState([]);
                    const [loading, setLoading] = useState(true);
                    const [error, setError] = useState(null);

                    useEffect(() => {
                        if (!firebaseAuthUser) return;
                        
                        const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', collectionName);

                        const unsubscribe = onSnapshot(collectionRef, (snapshot) => {
                            const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setData(items);
                            setLoading(false);
                            setError(null);
                        }, (err) => {
                            console.error("Error fetching " + collectionName, err);
                            setError(err);
                            setLoading(false);
                        });
                        return () => unsubscribe();
                    }, [collectionName, firebaseAuthUser]);

                    const getRef = () => collection(db, 'artifacts', appId, 'public', 'data', collectionName);

                    const add = async (item) => { 
                        try { await addDoc(getRef(), item); } catch(e) { console.error(e); throw e; } 
                    };
                    const update = async (id, item) => { 
                        try { const { id: _, ...data } = item; await updateDoc(doc(getRef(), id), data); } catch(e) { console.error(e); throw e; } 
                    };
                    const remove = async (id) => { 
                        try { await deleteDoc(doc(getRef(), id)); } catch(e) { console.error(e); throw e; } 
                    };

                    return { data, loading, error, add, update, remove };
                };

                const formatCurrency = (amount) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(amount);
                
                const formatDate = (dateStr) => {
                    if (!dateStr) return '';
                    return new Date(dateStr).toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
                };

                const ConfirmModal = ({ isOpen, message, onConfirm, onCancel }) => {
                    if (!isOpen) return null;
                    return (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[200]">
                            <div className="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4 relative z-[210]">
                                <div className="text-center mb-4"><div className="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-2 text-yellow-600 text-xl"><i className="fas fa-exclamation-triangle"></i></div><h3 className="text-lg font-bold text-gray-800">Please Confirm</h3></div>
                                <p className="text-gray-600 text-center mb-6">{message}</p>
                                <div className="flex justify-center space-x-3"><button onClick={onCancel} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded font-medium">Cancel</button><button onClick={onConfirm} className="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 font-bold">Confirm</button></div>
                            </div>
                        </div>
                    );
                };

                const Login = ({ onLogin, users, loading }) => {
                    const [username, setUsername] = useState('');
                    const [password, setPassword] = useState('');
                    const [showPassword, setShowPassword] = useState(false);
                    const [error, setError] = useState('');
                    const handleSubmit = (e) => {
                        e.preventDefault();
                        const user = users.find(u => u.username === username && u.password === password);
                        if (user) onLogin(user);
                        else setError('Invalid credentials');
                    };
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-gray-100">
                            <div className="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
                                <div className="text-center mb-8">
                                    <div className="w-20 h-20 mx-auto mb-4 bg-indigo-100 text-indigo-600 rounded-xl shadow-lg flex items-center justify-center text-4xl"><i className="fas fa-chart-line"></i></div>
                                    <h2 className="text-2xl font-bold text-gray-800">Financial System</h2><p className="text-gray-500">Sign in to your account</p>
                                </div>
                                {loading ? <p className="text-center text-indigo-600 font-bold animate-pulse">Loading System Data...</p> : (
                                    <form onSubmit={handleSubmit} autoComplete="off">
                                        {error && <div className="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm">{error}</div>}
                                        <div className="mb-4"><label className="block text-gray-700 text-sm font-bold mb-2">Username</label><input className="w-full p-3 border rounded" value={username} onChange={e => setUsername(e.target.value)} placeholder="Enter username" autoComplete="off" /></div>
                                        <div className="mb-6 relative"><label className="block text-gray-700 text-sm font-bold mb-2">Password</label><input className="w-full p-3 border rounded" type={showPassword ? "text" : "password"} value={password} onChange={e => setPassword(e.target.value)} placeholder="Enter password" autoComplete="new-password" /><button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-9 text-gray-500 hover:text-indigo-600 focus:outline-none"><i className={`fas ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i></button></div>
                                        <button className="w-full bg-indigo-600 text-white p-3 rounded hover:bg-indigo-700 font-bold transition">Sign In</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    );
                };

                const ProfileEditor = ({ user, usersDB, onClose, onUpdateUser }) => {
                    const [formData, setFormData] = useState({ name: '', username: '', password: '' });
                    const [showPassword, setShowPassword] = useState(false);
                    const [error, setError] = useState('');
                    
                    useEffect(() => {
                        const userDoc = usersDB.data.find(u => u.id === user.id);
                        if (userDoc) setFormData({ name: userDoc.name, username: userDoc.username, password: userDoc.password });
                    }, [user, usersDB.data]);

                    const handleSubmit = (e) => {
                        e.preventDefault();
                        setError('');
                        const existingUser = usersDB.data.find(u => u.username === formData.username && u.id !== user.id);
                        if (existingUser) { setError('Username already taken.'); return; }
                        
                        const userDoc = usersDB.data.find(u => u.id === user.id);
                        if (userDoc) {
                            usersDB.update(userDoc.id, { ...userDoc, name: formData.name, username: formData.username, password: formData.password });
                            const updatedUser = { ...user, name: formData.name, username: formData.username, password: formData.password };
                            onUpdateUser(updatedUser);
                            sessionStorage.setItem('cm_current_user', JSON.stringify(updatedUser));
                            onClose();
                        }
                    };

                    return (
                        <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-[200] p-4">
                            <div className="bg-white p-8 rounded-lg w-full max-w-md shadow-2xl relative">
                                <button onClick={onClose} className="absolute top-2 right-2 text-gray-400 hover:text-gray-600"><i className="fas fa-times"></i></button>
                                <h2 className="text-2xl font-bold text-gray-800 mb-4">Edit Profile</h2>
                                {error && <div className="bg-red-100 text-red-700 p-2 rounded mb-3 text-sm">{error}</div>}
                                <form onSubmit={handleSubmit}>
                                    <div className="mb-4"><h3 className="text-sm font-bold text-indigo-600 mb-2 uppercase">Account Details</h3>
                                        <div className="mb-3"><label className="block text-xs font-bold text-gray-500 mb-1">Full Name</label><input className="w-full border p-2 rounded" required value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} /></div>
                                        <div className="mb-3"><label className="block text-xs font-bold text-gray-500 mb-1">Username</label><input className="w-full border p-2 rounded" required value={formData.username} onChange={e => setFormData({...formData, username: e.target.value})} /></div>
                                        <div className="mb-3 relative"><label className="block text-xs font-bold text-gray-500 mb-1">Password</label><input className="w-full border p-2 rounded" required type={showPassword ? "text" : "password"} value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} /><button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-7 text-gray-500 hover:text-indigo-600"><i className={`fas ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i></button></div>
                                    </div>
                                    <button className="w-full bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700">Save Changes</button>
                                </form>
                            </div>
                        </div>
                    );
                };

                const Financials = ({ user, financesDB }) => { 
                    const transactions = financesDB.data;
                    const accessibleFunds = useMemo(() => DEPARTMENTS.filter(dept => getPermissions(user, dept).view), [user]);
                    
                    const [activeTab, setActiveTab] = useState('OVERVIEW');
                    const [form, setForm] = useState({ department: '', amount: '', type: 'income', description: '', date: new Date().toISOString().split('T')[0] });
                    const [editingId, setEditingId] = useState(null);
                    const [confirm, setConfirm] = useState({ isOpen: false, msg: '', action: null });

                    useEffect(() => { 
                        if (accessibleFunds.length === 0) setActiveTab('');
                    }, [accessibleFunds]);

                    useEffect(() => {
                        if (activeTab && activeTab !== 'OVERVIEW') {
                            setForm(prev => ({ ...prev, department: activeTab }));
                            setEditingId(null);
                        } else {
                            setEditingId(null);
                        }
                    }, [activeTab]);

                    const handleEdit = (t) => { 
                        setForm(t); 
                        setEditingId(t.id); 
                        if (t.department !== activeTab) setActiveTab(t.department);
                        window.scrollTo({ top: 0, behavior: 'smooth' }); 
                    };

                    const cancelEdit = () => { 
                        setEditingId(null); 
                        setForm({ ...form, amount: '', description: '', date: new Date().toISOString().split('T')[0] }); 
                    };

                    const triggerSubmit = (e) => { 
                        e.preventDefault(); 
                        const action = editingId ? "Update" : "Add"; 
                        setConfirm({ 
                            isOpen: true, 
                            msg: `${action} transaction for ${activeTab}?`, 
                            action: () => { 
                                if (editingId) financesDB.update(editingId, form).then(cancelEdit); 
                                else financesDB.add({ ...form, department: activeTab }); 
                            }
                        }); 
                    };

                    const triggerDelete = (id) => { 
                        setConfirm({ 
                            isOpen: true, 
                            msg: 'Delete this transaction permanently?', 
                            action: () => { financesDB.remove(id); if(editingId === id) cancelEdit(); }
                        }); 
                    };

                    const getDeptBalance = (dept) => { 
                        const deptTrans = transactions.filter(t => t.department === dept); 
                        const inc = deptTrans.filter(t => t.type === 'income').reduce((a, c) => a + parseFloat(c.amount || 0), 0); 
                        const exp = deptTrans.filter(t => t.type === 'expense').reduce((a, c) => a + parseFloat(c.amount || 0), 0); 
                        return inc - exp; 
                    };

                    const globalStats = useMemo(() => {
                        const relevantTrans = transactions.filter(t => accessibleFunds.includes(t.department));
                        const income = relevantTrans.filter(t => t.type === 'income').reduce((a, c) => a + parseFloat(c.amount || 0), 0);
                        const expense = relevantTrans.filter(t => t.type === 'expense').reduce((a, c) => a + parseFloat(c.amount || 0), 0);
                        return { income, expense, balance: income - expense };
                    }, [transactions, accessibleFunds]);

                    const visibleTransactions = transactions.filter(t => t.department === activeTab).sort((a,b) => new Date(b.date) - new Date(a.date));
                    const canManageCurrentFund = activeTab !== 'OVERVIEW' && getPermissions(user, activeTab).manage;
                    const currentBalance = activeTab !== 'OVERVIEW' ? getDeptBalance(activeTab) : 0;

                    if (accessibleFunds.length === 0) return <div className="p-6 text-center text-gray-500">You do not have permission to view any financial records.</div>;

                    return (
                        <div className="p-6">
                            <ConfirmModal isOpen={confirm.isOpen} message={confirm.msg} onConfirm={() => { confirm.action(); setConfirm({ isOpen: false, msg: '', action: null }); }} onCancel={() => setConfirm({ isOpen: false, msg: '', action: null })} />
                            
                            <div className="flex flex-col md:flex-row justify-between items-center mb-6">
                                <h2 className="text-2xl font-bold text-gray-800">Financial Tracker</h2>
                            </div>

                            <div className="flex overflow-x-auto space-x-1 mb-6 border-b border-gray-200 pb-1">
                                <button 
                                    onClick={() => setActiveTab('OVERVIEW')}
                                    className={`px-5 py-3 text-sm font-bold rounded-t-lg transition whitespace-nowrap ${activeTab === 'OVERVIEW' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-500 hover:bg-gray-50'}`}
                                >
                                    <i className="fas fa-th-large mr-2"></i>Overview
                                </button>
                                {accessibleFunds.map(dept => (
                                    <button 
                                        key={dept} 
                                        onClick={() => setActiveTab(dept)}
                                        className={`px-5 py-3 text-sm font-bold rounded-t-lg transition whitespace-nowrap ${activeTab === dept ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-500 hover:bg-gray-50'}`}
                                    >
                                        {dept}
                                    </button>
                                ))}
                            </div>

                            <div className="animate-fade-in">
                                {activeTab === 'OVERVIEW' ? (
                                    <div className="space-y-8">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            <div className="bg-white p-6 rounded-lg shadow border-l-4 border-indigo-600">
                                                <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">Total Net Balance</p>
                                                <p className={`text-3xl font-bold mt-1 ${globalStats.balance >= 0 ? 'text-gray-800' : 'text-red-600'}`}>{formatCurrency(globalStats.balance)}</p>
                                                <p className="text-xs text-gray-400 mt-2">Across {accessibleFunds.length} funds</p>
                                            </div>
                                            <div className="bg-white p-6 rounded-lg shadow border-l-4 border-green-500">
                                                <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">Total Income</p>
                                                <p className="text-3xl font-bold mt-1 text-green-600">{formatCurrency(globalStats.income)}</p>
                                                <p className="text-xs text-gray-400 mt-2">All time receipts</p>
                                            </div>
                                            <div className="bg-white p-6 rounded-lg shadow border-l-4 border-red-500">
                                                <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">Total Expense</p>
                                                <p className="text-3xl font-bold mt-1 text-red-600">{formatCurrency(globalStats.expense)}</p>
                                                <p className="text-xs text-gray-400 mt-2">All time expenditures</p>
                                            </div>
                                        </div>

                                        <div>
                                            <h3 className="text-lg font-bold text-gray-700 mb-4 border-b pb-2">Fund Breakdown</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                                {accessibleFunds.map(dept => {
                                                    const bal = getDeptBalance(dept);
                                                    return (
                                                        <div key={dept} onClick={() => setActiveTab(dept)} className="bg-white p-4 rounded-lg shadow hover:shadow-md transition cursor-pointer group border border-transparent hover:border-indigo-100">
                                                            <div className="flex justify-between items-start mb-2">
                                                                <h4 className="font-bold text-gray-800 group-hover:text-indigo-600 transition">{dept}</h4>
                                                                <i className="fas fa-arrow-right text-gray-300 group-hover:text-indigo-400 text-xs"></i>
                                                            </div>
                                                            <p className={`text-xl font-bold ${bal >= 0 ? 'text-gray-600' : 'text-red-500'}`}>{formatCurrency(bal)}</p>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        <div>
                                            <h3 className="text-lg font-bold text-gray-700 mb-4 border-b pb-2">Recent Activity (All Funds)</h3>
                                            <div className="bg-white rounded-lg shadow overflow-x-auto">
                                                <table className="w-full text-left min-w-[600px]">
                                                    <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                                                        <tr>
                                                            <th className="p-3 font-semibold">Date</th>
                                                            <th className="p-3 font-semibold">Fund</th>
                                                            <th className="p-3 font-semibold">Description</th>
                                                            <th className="p-3 font-semibold text-right">Amount</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {transactions
                                                            .filter(t => accessibleFunds.includes(t.department))
                                                            .sort((a,b) => new Date(b.date) - new Date(a.date))
                                                            .slice(0, 10)
                                                            .map(t => (
                                                            <tr key={t.id} className="border-b hover:bg-gray-50 text-sm">
                                                                <td className="p-3 whitespace-nowrap text-gray-500">{formatDate(t.date)}</td>
                                                                <td className="p-3"><span className="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs font-bold">{t.department}</span></td>
                                                                <td className="p-3 text-gray-700 max-w-xs truncate">{t.description}</td>
                                                                <td className={`p-3 text-right font-bold ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}`}>
                                                                    {t.type === 'expense' ? '-' : ''}{formatCurrency(t.amount)}
                                                                </td>
                                                            </tr>
                                                        ))}
                                                        {transactions.length === 0 && <tr><td colSpan="4" className="p-6 text-center text-gray-500 italic">No transactions recorded yet.</td></tr>}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="animate-fade-in">
                                        <div className="bg-white p-6 rounded-lg shadow border-l-4 border-indigo-500 mb-6 flex justify-between items-center">
                                            <div>
                                                <h3 className="text-sm font-bold text-gray-500 uppercase tracking-wide">{activeTab} Balance</h3>
                                                <div className={`text-3xl font-bold ${currentBalance >= 0 ? 'text-gray-800' : 'text-red-600'}`}>
                                                    {formatCurrency(currentBalance)}
                                                </div>
                                            </div>
                                            <div className="hidden md:block text-right text-xs text-gray-400">
                                                <p>Total Transactions: {visibleTransactions.length}</p>
                                            </div>
                                        </div>

                                        <div className="flex flex-col lg:flex-row gap-6">
                                            {canManageCurrentFund ? (
                                                <div className="lg:w-1/3 bg-white p-6 rounded-lg shadow h-fit">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <h3 className="font-bold text-lg text-gray-800">{editingId ? 'Edit Entry' : 'New Transaction'}</h3>
                                                        {editingId && <button onClick={cancelEdit} className="text-sm text-gray-500 hover:text-gray-700">Cancel</button>}
                                                    </div>
                                                    <form onSubmit={triggerSubmit}>
                                                        <div className="mb-3">
                                                            <label className="text-xs font-bold text-gray-500">Fund</label>
                                                            <input className="w-full border p-2 rounded bg-gray-100 text-gray-500 cursor-not-allowed" value={activeTab} disabled />
                                                        </div>
                                                        <div className="mb-3">
                                                            <label className="text-xs font-bold text-gray-500">Type</label>
                                                            <select className="w-full border p-2 rounded" value={form.type} onChange={e => setForm({...form, type: e.target.value})}>
                                                                <option value="income">Income / Donation</option>
                                                                <option value="expense">Expense</option>
                                                            </select>
                                                        </div>
                                                        <div className="mb-3">
                                                            <label className="text-xs font-bold text-gray-500">Amount</label>
                                                            <input type="number" step="0.01" required className="w-full border p-2 rounded" value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} />
                                                        </div>
                                                        <div className="mb-3">
                                                            <label className="text-xs font-bold text-gray-500">Date</label>
                                                            <input type="date" required className="w-full border p-2 rounded" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                                                        </div>
                                                        <div className="mb-4">
                                                            <label className="text-xs font-bold text-gray-500">Desc</label>
                                                            <input type="text" required className="w-full border p-2 rounded" value={form.description} onChange={e => setForm({...form, description: e.target.value})} />
                                                        </div>
                                                        <button type="submit" className={`w-full text-white py-2 rounded font-bold ${editingId ? 'bg-green-600 hover:bg-green-700' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                                                            {editingId ? 'Update Transaction' : 'Add Transaction'}
                                                        </button>
                                                    </form>
                                                </div>
                                            ) : (
                                                <div className="lg:w-1/3 bg-gray-50 p-6 rounded-lg border border-dashed border-gray-300 text-center h-fit">
                                                    <i className="fas fa-lock text-gray-300 text-3xl mb-2"></i>
                                                    <p className="text-sm text-gray-500">View Only Access</p>
                                                    <p className="text-xs text-gray-400">You cannot add records to {activeTab}.</p>
                                                </div>
                                            )}

                                            <div className="lg:w-2/3 bg-white rounded-lg shadow overflow-x-auto flex-1">
                                                <table className="w-full text-left border-collapse min-w-[600px]">
                                                    <thead className="bg-gray-50">
                                                        <tr>
                                                            <th className="p-3 text-xs font-bold text-gray-600 border-b">Date</th>
                                                            <th className="p-3 text-xs font-bold text-gray-600 border-b">Description</th>
                                                            <th className="p-3 text-xs font-bold text-gray-600 border-b text-right">Amount</th>
                                                            <th className="p-3 text-xs font-bold text-gray-600 border-b text-center">Action</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {visibleTransactions.length === 0 ? (
                                                            <tr><td colSpan="4" className="p-8 text-center text-gray-500 italic">No records found for this fund.</td></tr>
                                                        ) : (
                                                            visibleTransactions.map(t => (
                                                                <tr key={t.id} className={`hover:bg-gray-50 border-b ${editingId === t.id ? 'bg-blue-50' : ''}`}>
                                                                    <td className="p-3 text-sm whitespace-nowrap">{formatDate(t.date)}</td>
                                                                    <td className="p-3 text-sm font-medium">{t.description}</td>
                                                                    <td className={`p-3 text-sm font-bold text-right ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}`}>
                                                                        {t.type === 'expense' && '-'}{formatCurrency(t.amount)}
                                                                    </td>
                                                                    <td className="p-3 text-sm text-center">
                                                                        {canManageCurrentFund && (
                                                                            <div className="flex items-center justify-center space-x-2">
                                                                                <button onClick={() => handleEdit(t)} className="text-blue-500 hover:text-blue-700"><i className="fas fa-edit"></i></button>
                                                                                <button onClick={() => triggerDelete(t.id)} className="text-red-400 hover:text-red-600"><i className="fas fa-trash"></i></button>
                                                                            </div>
                                                                        )}
                                                                    </td>
                                                                </tr>
                                                            ))
                                                        )}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                };

                const Reports = ({ user, financesDB }) => {
                    const [config, setConfig] = useState({ 
                        department: DEPARTMENTS[0], 
                        period: 'Monthly', 
                        customStart: '', 
                        customEnd: ''
                    });
                    const [reportData, setReportData] = useState(null);
                    const accessibleDepts = useMemo(() => DEPARTMENTS.filter(d => getPermissions(user, d).view), [user]);

                    useEffect(() => { if(accessibleDepts.length > 0 && !accessibleDepts.includes(config.department)) setConfig(prev => ({ ...prev, department: accessibleDepts[0] })); }, [accessibleDepts]);

                    const generateReport = () => {
                        const now = new Date();
                        let startDate = new Date();
                        let endDate = new Date();

                        if (config.period === 'Weekly') {
                            startDate.setDate(now.getDate() - 7);
                        } else if (config.period === 'Monthly') {
                            startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                        } else if (config.period === 'Yearly') {
                            startDate = new Date(now.getFullYear(), 0, 1);
                        } else if (config.period === 'All Time') {
                            startDate = new Date(0); 
                        } else if (config.period === 'Custom') {
                            if (!config.customStart || !config.customEnd) {
                                alert("Please select both a start date and an end date.");
                                return;
                            }
                            startDate = new Date(config.customStart);
                            endDate = new Date(config.customEnd);
                            endDate.setHours(23, 59, 59, 999);
                        }
                        
                        startDate.setHours(0,0,0,0);

                        const previousTransactions = (financesDB.data || []).filter(t => {
                            const tDate = new Date(t.date);
                            return t.department === config.department && tDate < startDate;
                        });

                        const openingBalance = previousTransactions.reduce((acc, t) => {
                            const amount = parseFloat(t.amount || 0);
                            return t.type === 'income' ? acc + amount : acc - amount;
                        }, 0);

                        const finances = (financesDB.data || []).filter(t => { 
                            const tDate = new Date(t.date); 
                            return t.department === config.department && tDate >= startDate && tDate <= endDate; 
                        });
                        
                        setReportData({ 
                            finances, 
                            openingBalance,
                            meta: { ...config, startDate, endDate } 
                        });
                    };

                    const downloadPDF = () => {
                        const element = document.getElementById('report-content');
                        if (!element) return;
                        
                        const opt = {
                            margin:       0.5,
                            filename:     `Financial_Report_${config.department}_${new Date().toISOString().split('T')[0]}.pdf`,
                            image:        { type: 'jpeg', quality: 0.98 },
                            html2canvas:  { scale: 2, useCORS: true },
                            jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
                        };
                        
                        html2pdf().set(opt).from(element).save();
                    };

                    if (accessibleDepts.length === 0) return <div className="p-6 text-center text-gray-500">Access Denied.</div>;

                    return (
                        <div className="p-6">
                            {!reportData ? (
                                <div className="bg-white p-6 rounded-lg shadow max-w-lg mx-auto mt-10">
                                    <h2 className="text-xl font-bold mb-4 text-gray-800 border-b pb-2">Generate Report</h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 mb-1">Fund / Department</label>
                                            <select className="w-full border p-2 rounded" value={config.department} onChange={e => setConfig({...config, department: e.target.value})}>{accessibleDepts.map(d => <option key={d} value={d}>{d}</option>)}</select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 mb-1">Time Period</label>
                                            <select className="w-full border p-2 rounded" value={config.period} onChange={e => setConfig({...config, period: e.target.value})}>
                                                <option value="Weekly">Weekly (Last 7 Days)</option>
                                                <option value="Monthly">Monthly (Current Month)</option>
                                                <option value="Yearly">Yearly (Current Year)</option>
                                                <option value="Custom">Custom Date Range</option>
                                                <option value="All Time">All Time (All Records)</option>
                                            </select>
                                        </div>

                                        {config.period === 'Custom' && (
                                            <div className="grid grid-cols-2 gap-4 bg-gray-50 p-3 rounded border">
                                                <div>
                                                    <label className="block text-xs font-bold text-gray-500 mb-1">Start Date</label>
                                                    <input type="date" className="w-full border p-2 rounded text-sm" value={config.customStart} onChange={e => setConfig({...config, customStart: e.target.value})} />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-gray-500 mb-1">End Date</label>
                                                    <input type="date" className="w-full border p-2 rounded text-sm" value={config.customEnd} onChange={e => setConfig({...config, customEnd: e.target.value})} />
                                                </div>
                                            </div>
                                        )}
                                        <button onClick={generateReport} className="w-full bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700">Generate Report</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white p-8 rounded-lg shadow print:shadow-none print:w-full">
                                    <div className="no-print flex justify-end space-x-2 mb-4">
                                        <button onClick={() => setReportData(null)} className="text-gray-500 hover:text-gray-700 underline text-sm mr-4">Back to Settings</button>
                                        <button onClick={downloadPDF} className="bg-red-600 text-white px-4 py-2 rounded text-sm hover:bg-red-700 font-bold flex items-center"><i className="fas fa-file-pdf mr-2"></i> Download PDF</button>
                                    </div>

                                    <div id="report-content" className="p-4 bg-white">
                                        <div className="flex items-center border-b-2 border-indigo-600 pb-4 mb-6">
                                            <div className="w-16 h-16 rounded-lg mr-4 bg-indigo-100 text-indigo-600 flex items-center justify-center text-3xl"><i className="fas fa-chart-bar"></i></div>
                                            <div>
                                                <h1 className="text-2xl font-bold text-gray-800 uppercase tracking-wide">Financial System</h1>
                                                <p className="text-sm text-gray-500">Official Department Report</p>
                                            </div>
                                            <div className="ml-auto text-right">
                                                <p className="text-lg font-bold text-indigo-600">{config.department}</p>
                                                <p className="text-xs text-gray-400">
                                                    {config.period === 'Custom' 
                                                        ? `${formatDate(reportData.meta.startDate)} - ${formatDate(reportData.meta.endDate)}`
                                                        : config.period}
                                                </p>
                                            </div>
                                        </div>

                                        <div className="mb-8">
                                            <h3 className="text-lg font-bold text-gray-700 mb-3 uppercase tracking-wide">Financial Statement</h3>
                                            
                                            <div className="grid grid-cols-4 gap-4 mb-6 text-center">
                                                <div className="bg-gray-50 p-3 rounded border border-gray-200">
                                                    <span className="block text-[10px] font-bold text-gray-500 uppercase">Opening Balance</span>
                                                    <span className="text-md font-bold text-blue-600">{formatCurrency(reportData.openingBalance)}</span>
                                                </div>
                                                <div className="bg-gray-50 p-3 rounded border border-gray-200">
                                                    <span className="block text-[10px] font-bold text-gray-500 uppercase">Total Income</span>
                                                    <span className="text-md font-bold text-green-600">+{formatCurrency(reportData.finances.filter(f => f.type === 'income').reduce((a,c) => a+parseFloat(c.amount), 0))}</span>
                                                </div>
                                                <div className="bg-gray-50 p-3 rounded border border-gray-200">
                                                    <span className="block text-[10px] font-bold text-gray-500 uppercase">Total Expense</span>
                                                    <span className="text-md font-bold text-red-600">-{formatCurrency(reportData.finances.filter(f => f.type === 'expense').reduce((a,c) => a+parseFloat(c.amount), 0))}</span>
                                                </div>
                                                <div className="bg-indigo-50 p-3 rounded border border-indigo-200">
                                                    <span className="block text-[10px] font-bold text-indigo-800 uppercase">Closing Balance</span>
                                                    <span className="text-lg font-bold text-indigo-900">
                                                        {formatCurrency(
                                                            reportData.openingBalance + 
                                                            reportData.finances.filter(f => f.type === 'income').reduce((a,c) => a+parseFloat(c.amount), 0) - 
                                                            reportData.finances.filter(f => f.type === 'expense').reduce((a,c) => a+parseFloat(c.amount), 0)
                                                        )}
                                                    </span>
                                                </div>
                                            </div>

                                            <table className="w-full text-left text-sm border">
                                                <thead className="bg-gray-100 text-gray-600 uppercase text-xs">
                                                    <tr>
                                                        <th className="p-2 border">Date</th>
                                                        <th className="p-2 border">Description</th>
                                                        <th className="p-2 border text-right">Amount</th>
                                                        <th className="p-2 border text-right">Balance</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <tr className="bg-blue-50 font-bold text-blue-800">
                                                        <td className="p-2 border" colSpan="3">PREVIOUS BALANCE / CARRY OVER</td>
                                                        <td className="p-2 border text-right">{formatCurrency(reportData.openingBalance)}</td>
                                                    </tr>

                                                    {reportData.finances.map((t, index) => {
                                                        let runningBal = reportData.openingBalance;
                                                        for(let i=0; i<=index; i++) {
                                                            const item = reportData.finances[i];
                                                            const amt = parseFloat(item.amount);
                                                            if (item.type === 'income') runningBal += amt;
                                                            else runningBal -= amt;
                                                        }

                                                        return (
                                                            <tr key={t.id}>
                                                                <td className="p-2 border">{formatDate(t.date)}</td>
                                                                <td className="p-2 border">{t.description}</td>
                                                                <td className={`p-2 border text-right font-medium ${t.type==='income'?'text-green-600':'text-red-600'}`}>
                                                                    {t.type==='expense'?'-':'+'}{formatCurrency(t.amount)}
                                                                </td>
                                                                <td className="p-2 border text-right font-bold text-gray-700">
                                                                    {formatCurrency(runningBal)}
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                    {reportData.finances.length === 0 && (
                                                        <tr><td colSpan="4" className="p-4 text-center text-gray-500 italic">No transactions in this period.</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                        <div className="mt-12 text-center text-xs text-gray-400 border-t pt-4">
                                            <p>Report Generated by {user.name} on {new Date().toLocaleString('en-PH')}</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                };

                const Settings = ({ user, usersDB }) => { 
                    const users = usersDB.data;
                    const [editingUserId, setEditingUserId] = useState(null);
                    const [newUser, setNewUser] = useState({ username: '', password: '', name: '', role: 'treasurer', authorizedDepartments: [] });
                    const [confirm, setConfirm] = useState({ isOpen: false, msg: '', action: null });
                    const [errorMsg, setErrorMsg] = useState('');
                    const [showPassword, setShowPassword] = useState(false);
                    const toggleAuthDept = (dept) => { const current = newUser.authorizedDepartments; setNewUser({ ...newUser, authorizedDepartments: current.includes(dept) ? current.filter(d => d !== dept) : [...current, dept] }); };
                    const handleEditUser = (u) => { setEditingUserId(u.id); setNewUser({ username: u.username, password: u.password, name: u.name, role: u.role, authorizedDepartments: u.authorizedDepartments || [] }); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                    const triggerDelete = (id) => { setConfirm({ isOpen: true, msg: 'Permanently delete this user account?', action: () => { usersDB.remove(id); if (editingUserId === id) cancelEdit(); }}); };
                    const cancelEdit = () => { setEditingUserId(null); setNewUser({ username: '', password: '', name: '', role: 'treasurer', authorizedDepartments: [] }); setErrorMsg(''); };
                    
                    const triggerSubmit = (e) => { 
                        e.preventDefault(); 
                        setErrorMsg(''); 
                        
                        const duplicateUser = users.find(u => u.username === newUser.username && u.id !== editingUserId);
                        if (duplicateUser) { 
                            setErrorMsg('Username already exists'); 
                            return; 
                        } 

                        if (editingUserId) {
                            setConfirm({ 
                                isOpen: true, 
                                msg: `Update account details for ${newUser.name}?`, 
                                action: () => { 
                                    usersDB.update(editingUserId, newUser)
                                        .then(() => cancelEdit())
                                        .catch(err => setErrorMsg("Update failed: " + err.message));
                                }
                            }); 
                        } else {
                            setConfirm({ 
                                isOpen: true, 
                                msg: `Create new account for ${newUser.name}?`, 
                                action: () => { 
                                    usersDB.add(newUser)
                                        .then(() => setNewUser({ username: '', password: '', name: '', role: 'treasurer', authorizedDepartments: [] }))
                                        .catch(err => setErrorMsg("Creation failed: " + err.message));
                                } 
                            }); 
                        }
                    };

                    return (<div className="p-6"><ConfirmModal isOpen={confirm.isOpen} message={confirm.msg} onConfirm={() => { confirm.action(); setConfirm({ isOpen: false, msg: '', action: null }); }} onCancel={() => setConfirm({ isOpen: false, msg: '', action: null })} /><h2 className="text-2xl font-bold mb-6 text-gray-800">User Management</h2><div className="bg-white p-6 rounded-lg shadow border-t-4 border-indigo-600"><div className="flex justify-between items-center mb-4"><h3 className="text-lg font-bold">{editingUserId ? 'Edit User Account' : 'Create New Account'}</h3>{editingUserId && <button onClick={cancelEdit} className="text-sm text-gray-500 hover:text-gray-700">Cancel Edit</button>}</div>{errorMsg && <div className="bg-red-100 text-red-700 p-2 rounded mb-3 text-sm">{errorMsg}</div>}<form onSubmit={triggerSubmit}><div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"><input className="border p-2 rounded" placeholder="Full Name" required value={newUser.name} onChange={e => setNewUser({...newUser, name: e.target.value})} /><input className="border p-2 rounded" placeholder="Username" required value={newUser.username} onChange={e => setNewUser({...newUser, username: e.target.value})} /><div className="relative"><input className="w-full border p-2 rounded" type={showPassword ? "text" : "password"} placeholder="Password" required value={newUser.password} onChange={e => setNewUser({...newUser, password: e.target.value})} /><button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-2 text-gray-500 hover:text-indigo-600 focus:outline-none"><i className={`fas ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i></button></div><div><select className="w-full border p-2 rounded bg-gray-50" value={newUser.role} onChange={e => setNewUser({...newUser, role: e.target.value})}><option value="treasurer">Role: Treasurer (Limited Access)</option><option value="admin">Role: Admin (Full Access)</option></select></div></div>{newUser.role === 'treasurer' && <div className="mb-4 bg-yellow-50 p-4 rounded border border-yellow-100"><label className="block text-xs font-bold text-yellow-800 mb-2">Select Accessible Funds:</label><div className="grid grid-cols-2 md:grid-cols-4 gap-2">{DEPARTMENTS.map(dept => (<label key={dept} className="flex items-center text-sm cursor-pointer"><input type="checkbox" className="mr-2" checked={newUser.authorizedDepartments.includes(dept)} onChange={() => toggleAuthDept(dept)} />{dept}</label>))}</div></div>}<button type="submit" className={`w-full text-white px-6 py-3 rounded font-bold ${editingUserId ? 'bg-green-600 hover:bg-green-700' : 'bg-indigo-600 hover:bg-indigo-700'}`}>{editingUserId ? 'Update Account' : 'Create Account'}</button></form><div className="mt-8 border-t pt-4"><h4 className="font-bold text-sm text-gray-500 mb-2">Existing System Users</h4><div className="grid grid-cols-1 gap-2 max-h-40 overflow-y-auto">{users.map(u => (<div key={u.id} className={`p-3 bg-gray-50 rounded border flex justify-between items-center text-sm ${editingUserId === u.id ? 'border-green-500 border-2' : ''}`}><div><span className="font-bold">{u.name}</span> <span className="text-gray-400 text-xs ml-2">@{u.username}</span></div><div className="flex gap-2"><button onClick={() => handleEditUser(u)} className="text-blue-500 hover:text-blue-700 p-1"><i className="fas fa-edit"></i></button>{u.id !== 1 && <button onClick={() => triggerDelete(u.id)} className="text-red-500 hover:text-red-700 p-1"><i className="fas fa-trash"></i></button>}</div></div>))}</div></div></div></div>);
                };

                const App = () => {
                    const [user, setUser] = useState(null);
                    // Default view is now finances
                    const [view, setView] = useState('finances');
                    const [showProfileEdit, setShowProfileEdit] = useState(false);
                    const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
                    const [logoutConfirmOpen, setLogoutConfirmOpen] = useState(false); 
                    const [firebaseUser, setFirebaseUser] = useState(null);

                    useEffect(() => {
                        if (user) window.history.replaceState({ view: 'finances' }, '');
                        const handlePopState = (event) => {
                            if (event.state && event.state.view) setView(event.state.view);
                            else setView('finances');
                        };
                        window.addEventListener('popstate', handlePopState);
                        return () => window.removeEventListener('popstate', handlePopState);
                    }, [user]);

                    const handleNavigation = (targetView) => {
                        if (targetView === view) {
                            setIsMobileMenuOpen(false);
                            return;
                        }
                        if (targetView === 'finances') setView('finances');
                        else {
                            if (view === 'finances') window.history.pushState({ view: targetView }, '');
                            else window.history.replaceState({ view: targetView }, '');
                            setView(targetView);
                        }
                        setIsMobileMenuOpen(false);
                    };

                    useEffect(() => {
                        const initAuth = async () => {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        };
                        initAuth();
                        const unsubscribe = onAuthStateChanged(auth, (u) => setFirebaseUser(u));
                        return () => unsubscribe();
                    }, []);

                    const usersDB = useFirestore('users', firebaseUser);
                    const financesDB = useFirestore('finances', firebaseUser);

                    useEffect(() => {
                        if (firebaseUser && !usersDB.loading && !usersDB.error && usersDB.data.length === 0) {
                            usersDB.add(INITIAL_ADMIN).catch(e => console.log("Auto-create Admin failed:", e));
                        }
                    }, [usersDB.loading, usersDB.data, usersDB.error, firebaseUser]);

                    useEffect(() => {
                        const savedUser = sessionStorage.getItem('cm_current_user');
                        if (savedUser) {
                            try { setUser(JSON.parse(savedUser)); } catch (e) { console.error(e); }
                        }
                    }, []);
                    
                    const handleLogin = (userData) => {
                        setUser(userData);
                        sessionStorage.setItem('cm_current_user', JSON.stringify(userData));
                        setView('finances');
                        window.history.replaceState({ view: 'finances' }, '');
                    };
                    
                    const confirmLogout = () => setLogoutConfirmOpen(true);

                    const executeLogout = () => { 
                        setUser(null); 
                        sessionStorage.removeItem('cm_current_user'); 
                        setView('finances'); 
                        setIsMobileMenuOpen(false); 
                        setLogoutConfirmOpen(false);
                        window.history.replaceState(null, '');
                    };
                    
                    if (!firebaseUser) return <div className="loading-overlay"><i className="fas fa-circle-notch fa-spin text-4xl text-indigo-600 mb-2"></i><p className="font-bold text-gray-700">Connecting to Database...</p></div>;
                    if (!user) return <Login onLogin={handleLogin} users={usersDB.data} loading={usersDB.loading} />;
                    
                    const NavItem = ({ id, icon, label, allowedRoles }) => {
                        if (allowedRoles && !allowedRoles.includes(user.role)) return null;
                        return (
                            <button onClick={() => handleNavigation(id)} className={`sidebar-link w-full text-left p-3 rounded mb-1 flex items-center transition ${view === id ? 'active' : 'text-gray-600'}`}>
                                <i className={`fas ${icon} w-8 text-center`}></i>
                                <span className="font-medium">{label}</span>
                            </button>
                        );
                    };
                    
                    const anyLoading = usersDB.loading || financesDB.loading;
                    const anyError = usersDB.error || financesDB.error;

                    return (
                        <div className="flex h-screen overflow-hidden">
                            <ConfirmModal isOpen={logoutConfirmOpen} message="Are you sure you want to sign out?" onConfirm={executeLogout} onCancel={() => setLogoutConfirmOpen(false)} />
                            {anyLoading && !anyError && <div className="loading-overlay"><i className="fas fa-spinner fa-spin text-4xl text-indigo-600 mb-2"></i><p className="font-bold text-gray-700">Loading Data...</p></div>}
                            {anyError && (
                                <div className="fixed inset-0 flex items-center justify-center bg-gray-50 z-[2000] p-4">
                                    <div className="bg-white p-8 rounded-lg shadow-2xl max-w-lg text-center border-l-4 border-red-500 overflow-y-auto max-h-[90vh]">
                                        <h2 className="text-2xl font-bold text-gray-800 mb-2">Connection Issue</h2>
                                        <p className="text-xs text-red-400">{anyError.message}</p>
                                        <button onClick={() => window.location.reload()} className="mt-4 bg-gray-800 text-white px-4 py-2 rounded">Retry</button>
                                    </div>
                                </div>
                            )}

                            {showProfileEdit && <ProfileEditor user={user} usersDB={usersDB} onClose={() => setShowProfileEdit(false)} onUpdateUser={setUser} />}
                            {isMobileMenuOpen && <div className="fixed inset-0 bg-black bg-opacity-50 z-20 md:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>}

                            <div className={`fixed inset-y-0 left-0 transform ${isMobileMenuOpen ? "translate-x-0" : "-translate-x-full"} md:relative md:translate-x-0 transition duration-200 ease-in-out z-30 w-64 bg-white shadow-xl flex flex-col`}>
                                <div className="p-6 border-b flex items-center space-x-3">
                                    <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center text-xl shadow-sm"><i className="fas fa-wallet"></i></div>
                                    <div><h1 className="font-bold text-sm text-gray-800 leading-tight">Financial System</h1></div>
                                </div>
                                <nav className="flex-1 p-4 overflow-y-auto">
                                    <NavItem id="finances" icon="fa-file-invoice-dollar" label="Financials" />
                                    <NavItem id="reports" icon="fa-file-alt" label="Reports" allowedRoles={['admin', 'treasurer']} />
                                    <div className="my-4 border-t border-gray-200"></div>
                                    <NavItem id="settings" icon="fa-users-cog" label="User Management" allowedRoles={['admin']} />
                                </nav>
                                <div className="p-4 border-t bg-gray-50">
                                    <div className="flex items-center mb-3 cursor-pointer hover:bg-gray-100 p-2 rounded transition" onClick={() => { setShowProfileEdit(true); setIsMobileMenuOpen(false); }}>
                                        <div className="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold mr-2">{user.name.charAt(0)}</div>
                                        <div className="overflow-hidden"><p className="text-sm font-bold text-gray-800 truncate">{user.name}</p><p className="text-xs text-gray-500 capitalize">{user.role}</p></div>
                                        <i className="fas fa-pencil-alt ml-auto text-gray-400 text-xs"></i>
                                    </div>
                                    <button onClick={confirmLogout} className="w-full text-sm text-red-600 hover:text-red-800 text-left"><i className="fas fa-sign-out-alt mr-2"></i> Sign Out</button>
                                </div>
                            </div>
                            
                            <div className="md:hidden fixed top-0 w-full bg-white shadow z-20 p-4 flex justify-between items-center no-print">
                                <div className="flex items-center">
                                    <button onClick={() => setIsMobileMenuOpen(true)} className="mr-4 text-gray-700 focus:outline-none"><i className="fas fa-bars text-xl"></i></button>
                                    <div><span className="font-bold block text-gray-800 leading-tight">Financial System</span></div>
                                </div>
                                <button onClick={confirmLogout} className="text-red-600"><i className="fas fa-sign-out-alt"></i></button>
                            </div>

                            <div className="flex-1 overflow-auto pt-20 md:pt-0 pb-20 md:pb-0 h-full w-full main-content safe-pb">
                                {view === 'finances' && <Financials user={user} financesDB={financesDB} />}
                                {view === 'reports' && <Reports user={user} financesDB={financesDB} />}
                                {view === 'settings' && <Settings user={user} usersDB={usersDB} />}
                            </div>
                        </div>
                    );
                };
                
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
                
            } catch (error) {
                console.error("Critical Application Error:", error);
                document.getElementById('root').innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #7f1d1d; font-family: sans-serif; background-color: #fef2f2; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 16px; color: #ef4444;"></i>
                        <h2 style="font-size: 24px; font-weight: bold; margin-bottom: 8px;">System Error</h2>
                        <p style="margin-bottom: 16px; max-width: 400px; line-height: 1.5;">The application encountered an unexpected error while trying to load.</p>
                        <div style="background: white; padding: 16px; border-radius: 8px; text-align: left; max-width: 90%; overflow-x: auto; font-family: monospace; font-size: 12px; border: 1px solid #fca5a5; color: #991b1b;">
                            ${error.message}
                        </div>
                    </div>
                `;
            }
        };

        let loadAttempts = 0;
        const checkDependencies = setInterval(() => {
            if (window.firebaseModules && window.React && window.ReactDOM) {
                clearInterval(checkDependencies);
                startApp();
            } else {
                loadAttempts++;
                if (loadAttempts > 100) { 
                    clearInterval(checkDependencies);
                    document.getElementById('root').innerHTML = `
                        <div style="padding: 40px; text-align: center; color: #7f1d1d; font-family: sans-serif; background-color: #fef2f2; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <i class="fas fa-wifi" style="font-size: 48px; margin-bottom: 16px; color: #ef4444;"></i>
                            <h2 style="font-size: 24px; font-weight: bold; margin-bottom: 8px;">Connection Timeout</h2>
                            <p style="max-width: 400px; line-height: 1.5;">Failed to load required system modules. Please check your internet connection or try disabling any ad-blockers.</p>
                            <button onclick="window.location.reload()" style="margin-top: 20px; padding: 10px 24px; background: #ef4444; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 6px rgba(239, 68, 68, 0.2);">Refresh Page</button>
                        </div>
                    `;
                }
            }
        }, 100);
    </script>
</body>
</html>
